name: PrajaTantra Pinger

on:
  schedule:
    # Changed from 10 mins to 5 mins to stay ahead of GitHub delays
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests pytz

      - name: Execute Pinger Script
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }} 
        run: python Ping.py
