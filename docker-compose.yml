services:
  backend:
    build:
      context: ./backend
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      NEO4J_DATABASE: neo4j
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: prajatantra
      POSTGRES_USER: prajatantra
      POSTGRES_PASSWORD: prajatantra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/001_core_schema.sql:/docker-entrypoint-initdb.d/001_core_schema.sql:ro

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - neo4j_data:/data
      # NOTE: removed ":ro" — Neo4j's entrypoint chowns every file under
      # /var/lib/neo4j/import/ on startup. A read-only bind mount makes that
      # chown fail with "Read-only file system", which crashes the container
      # (exit code 1) before Neo4j ever starts listening. Mounting writable
      # lets the entrypoint fix ownership and continue; the file's contents
      # are still only ever read by Neo4j, nothing in this stack writes to it.
      - ./database/neo4j/001_constraints.cypher:/var/lib/neo4j/import/001_constraints.cypher

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  neo4j_data: